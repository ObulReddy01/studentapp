apiVersion: apps/v1
kind: Deployment
metadata:
  name: studentapp
  namespace: studentapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: studentapp
  template:
    metadata:
      labels:
        app: studentapp
    spec:
      containers:
      - name: studentapp
        image: bhargavsai29042005/studentapp:v1
        ports:
        - containerPort: 8080